name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
        # postinstall runs electron-rebuild automatically
      - run: npm run lint
      - run: npm run check:m131
      - run: npm run check:m133
      - run: npm run test -- --reporter=verbose
      - run: npm run build
