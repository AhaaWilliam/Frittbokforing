name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
        # postinstall runs electron-rebuild automatically
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check:m131
      - run: npm run check:m133
      - run: npm run check:m133-ast
      - run: npm run check:m153
      # Fail-fast smoke per test-kategori — fångar om en katalog råkar tas
      # bort eller glob-filteras bort. Varje kommando är ~1s (< 30s totalt)
      # och ger tydlig CI-rapportering per test-lager.
      - run: npm run test:property
      - run: npm run test:invariants
      - run: npm run test:state-machine
      - run: npm run test:security-fuzz
      # Full svit (redundant mot ovan men säkerställer att inget lager är
      # ensamt grönt medan resten failar — och täcker övriga tester/ som
      # inte grupperas i kategorierna ovan).
      - run: npm run test -- --reporter=verbose
      - run: npm run build

  mutation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'
      - run: npm ci
      # Stryker körs bara mot src/shared/money.ts (F-TT-002: upstream-
      # inkompatibilitet Stryker 9.6 × Vitest 4 × better-sqlite3 blockar
      # mutation mot services). Scope utvidgas när upstream-fix landar.
      - run: npm run test:mutation
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
